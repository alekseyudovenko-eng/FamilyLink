<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiveKit Video Call</title>
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    <!-- Подключаем клиент LiveKit -->
    <script src="https://cdn.jsdelivr.net/npm/livekit-client@1.15.0/dist/livekit-client.umd.min.js"></script>
    <style>
        :root {
            --bg-color: #f4f4f4;
            --panel-bg: #fff;
            --text-color: #333;
            --accent-color: #000;
            --border-color: #ccc;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        .workspace {
            display: flex;
            flex: 1;
            position: relative;
            background: #000;
        }

        /* Видео собеседника (Большое) */
        .remote-video-wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .remote-video-wrapper video {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        /* Ваше видео (Малое, PiP) */
        .local-video-wrapper {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 25%;
            max-width: 300px;
            aspect-ratio: 16/9;
            background: #222;
            border: 2px solid rgba(255,255,255,0.2);
            z-index: 10;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        .local-video-wrapper video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1); /* Зеркало */
        }

        .label {
            position: absolute;
            bottom: 5px;
            left: 5px;
            background: rgba(0,0,0,0.6);
            color: white;
            padding: 2px 6px;
            font-size: 10px;
            border-radius: 3px;
            pointer-events: none;
        }

        /* Панель управления */
        .control-panel {
            height: 60px;
            background: var(--panel-bg);
            border-top: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
        }

        .room-info {
            font-family: monospace;
            font-size: 14px;
            color: #666;
        }

        .controls {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            text-transform: uppercase;
            font-weight: 500;
        }

        .btn-primary { background: var(--accent-color); color: white; }
        .btn-danger { background: #dc3545; color: white; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .status {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            z-index: 20;
        }
    </style>
</head>
<body>

    <div class="workspace">
        <div class="status" id="status">Настройка...</div>
        
        <!-- Видео собеседника -->
        <div class="remote-video-wrapper" id="remoteVideoContainer">
            <div style="color: #666;">Ожидание собеседника...</div>
        </div>

        <!-- Ваше видео -->
        <div class="local-video-wrapper">
            <video id="localVideo" autoplay muted playsinline></video>
            <div class="label">Вы</div>
        </div>
    </div>

    <div class="control-panel">
        <div class="room-info" id="roomDisplay">Комната: не подключено</div>
        
        <div class="controls">
            <button id="connectBtn" class="btn btn-primary">Подключиться</button>
            <button id="disconnectBtn" class="btn btn-danger" disabled>Отключиться</button>
        </div>
    </div>

    <script>
        let room;
        const statusDiv = document.getElementById('status');
        const remoteContainer = document.getElementById('remoteVideoContainer');
        const localVideoEl = document.getElementById('localVideo');
        const connectBtn = document.getElementById('connectBtn');
        const disconnectBtn = document.getElementById('disconnectBtn');
        const roomDisplay = document.getElementById('roomDisplay');

        // Имя комнаты (можно менять)
        const ROOM_NAME = 'my-business-room'; 

        connectBtn.onclick = async () => {
            // 1. Запрашиваем данные у пользователя (так как нет бэкенда)
            const url = prompt("Введите ваш LiveKit Project URL (например: wss://project-123.livekit.cloud):");
            if (!url) return;

            const token = prompt("Введите ваш Access Token (сгенерируйте в LiveKit Cloud Console):");
            if (!token) return;

            connectBtn.disabled = true;
            statusDiv.innerText = "Подключение...";

            try {
                // 2. Создаем объект комнаты
                room = new LivekitClient.Room();

                // 3. Обработка появления видео собеседника
                room.on(LivekitClient.RoomEvent.TrackSubscribed, (track, publication, participant) => {
                    console.log("Track subscribed", track.kind);
                    if (track.kind === 'video' || track.kind === 'audio') {
                        // Очищаем контейнер и добавляем новое видео
                        remoteContainer.innerHTML = ''; 
                        const element = track.attach();
                        // Стилизация прикрепленного видео
                        element.style.width = '100%';
                        element.style.height = '100%';
                        element.style.objectFit = 'contain';
                        remoteContainer.appendChild(element);
                        
                        statusDiv.innerText = "Звонок идет";
                        roomDisplay.innerText = "Комната: " + ROOM_NAME;
                    }
                });

                room.on(LivekitClient.RoomEvent.Disconnected, () => {
                    resetUI();
                });

                // 4. Подготовка и получение доступа к камере
                await room.prepareConnection(url, token);
                const localTracks = await LivekitClient.createLocalTracks({ audio: true, video: true });
                
                // Отображаем себя локально
                localTracks.forEach(track => {
                    if (track.kind === 'video') {
                        // Livekit создает элемент, но мы хотим использовать наш #localVideo для дизайна
                        // Поэтому просто берем поток
                         localVideoEl.srcObject = track.mediaStream;
                    }
                });

                // 5. Подключение к комнате и публикация своих треков
                await room.connect(url, token);
                await room.localParticipant.publishTracks(localTracks);

                disconnectBtn.disabled = false;
                statusDiv.innerText = "Подключено. Ждем собеседника...";

            } catch (err) {
                console.error(err);
                statusDiv.innerText = "Ошибка: " + err.message;
                connectBtn.disabled = false;
                alert("Не удалось подключиться. Проверьте URL и Токен.");
            }
        };

        disconnectBtn.onclick = () => {
            if (room) {
                room.disconnect();
            }
        };

        function resetUI() {
            remoteContainer.innerHTML = '<div style="color: #666;">Ожидание собеседника...</div>';
            localVideoEl.srcObject = null;
            connectBtn.disabled = false;
            disconnectBtn.disabled = true;
            statusDiv.innerText = "Отключено";
            roomDisplay.innerText = "Комната: не подключено";
        }
    </script>
</body>
</html>
