<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Video Call</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        :root {
            --bg-color: #f4f4f4;
            --panel-bg: #fff;
            --text-color: #333;
            --accent-color: #000;
            --border-color: #ccc;
            --chat-bg: #fafafa;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Основная рабочая область */
        .workspace {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Левая часть: Видео */
        .video-container {
            flex: 3;
            position: relative;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        #remoteVideo {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* Малое окно (Picture-in-Picture) */
        .pip-window {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 25%; /* Примерно 1/9 площади при соотношении 16:9 */
            max-width: 320px;
            min-width: 160px;
            aspect-ratio: 16/9;
            background: #222;
            border: 2px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            z-index: 10;
            overflow: hidden;
        }

        #localVideo {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1); /* Зеркалим себя */
        }

        .pip-label {
            position: absolute;
            top: 5px;
            left: 5px;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 3px;
            pointer-events: none;
        }

        /* Правая часть: Чат */
        .chat-container {
            flex: 1;
            min-width: 300px;
            max-width: 400px;
            background: var(--panel-bg);
            border-left: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            padding: 15px;
            border-bottom: 1px solid var(--border-color);
            font-weight: bold;
            background: #f9f9f9;
        }

        .chat-messages {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            background: var(--chat-bg);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message {
            max-width: 85%;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 14px;
            line-height: 1.4;
        }

        .message.sent {
            align-self: flex-end;
            background: var(--accent-color);
            color: #fff;
        }

        .message.received {
            align-self: flex-start;
            background: #e0e0e0;
            color: #000;
        }

        .chat-input-area {
            padding: 15px;
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 10px;
        }

        .chat-input-area input {
            flex: 1;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        .chat-input-area button {
            padding: 8px 15px;
            background: var(--accent-color);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        /* Нижняя панель управления */
        .control-panel {
            height: 60px;
            background: var(--panel-bg);
            border-top: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            gap: 20px;
        }

        .id-section {
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 200px;
        }

        .my-id-btn {
            background: #f0f0f0;
            border: 1px solid #ccc;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-family: monospace;
            font-size: 14px;
            transition: background 0.2s;
            max-width: 150px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .my-id-btn:hover {
            background: #e0e0e0;
        }

        .call-section {
            display: flex;
            gap: 10px;
            flex: 1;
            justify-content: center;
        }

        .input-id {
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            width: 200px;
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            text-transform: uppercase;
            font-weight: 500;
            transition: opacity 0.2s;
        }

        .btn-primary { background: var(--accent-color); color: white; }
        .btn-primary:hover { opacity: 0.8; }
        
        .btn-secondary { background: #fff; border: 1px solid #ccc; color: #333; }
        .btn-secondary:hover { background: #f9f9f9; }
        
        .btn-danger { background: #dc3545; color: white; }
        .btn-danger:hover { background: #c82333; }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .status-indicator {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            z-index: 20;
            pointer-events: none;
        }

        /* Адаптив для мобильных */
        @media (max-width: 768px) {
            .workspace { flex-direction: column; }
            .chat-container { height: 30%; min-width: 100%; max-width: 100%; border-left: none; border-top: 1px solid #ccc; }
            .control-panel { flex-direction: column; height: auto; padding: 10px; gap: 10px; }
            .call-section { flex-wrap: wrap; justify-content: center; }
            .pip-window { width: 35%; bottom: 10px; right: 10px; }
        }
    </style>
</head>
<body>

    <div class="workspace">
        <!-- Видео зона -->
        <div class="video-container">
            <div class="status-indicator" id="status">Инициализация...</div>
            
            <!-- Большое видео (Собеседник) -->
            <video id="remoteVideo" autoplay playsinline></video>

            <!-- Малое видео (Вы) -->
            <div class="pip-window">
                <video id="localVideo" autoplay muted playsinline></video>
                <div class="pip-label">Вы</div>
            </div>
        </div>

        <!-- Чат зона -->
        <div class="chat-container">
            <div class="chat-header">Сообщения</div>
            <div class="chat-messages" id="chatMessages">
                <div style="color: #999; font-size: 12px; text-align: center; margin-top: 20px;">
                    Чат доступен во время звонка
                </div>
            </div>
            <div class="chat-input-area">
                <input type="text" id="chatInput" placeholder="Введите сообщение..." disabled>
                <button id="sendChatBtn" disabled>Send</button>
            </div>
        </div>
    </div>

    <!-- Панель управления -->
    <div class="control-panel">
        <div class="id-section">
            <span style="font-size: 12px; color: #666;">Ваш ID:</span>
            <button class="my-id-btn" id="myIdBtn" title="Нажмите, чтобы скопировать">Загрузка...</button>
        </div>

        <div class="call-section">
            <input type="text" id="remoteIdInput" class="input-id" placeholder="ID собеседника">
            <button id="callBtn" class="btn btn-primary">Вызов</button>
            <button id="screenShareBtn" class="btn btn-secondary" disabled>Экран</button>
            <button id="hangupBtn" class="btn btn-danger" disabled>Стоп</button>
        </div>
        
        <div style="width: 100px;"></div> <!-- Пустой блок для баланса центровки -->
    </div>

    <script>
        // --- Инициализация ---
        const peer = new Peer(null, { debug: 2 });
        const localVideo = document.getElementById('localVideo');
        const remoteVideo = document.getElementById('remoteVideo');
        const statusDiv = document.getElementById('status');
        const myIdBtn = document.getElementById('myIdBtn');
        
        // Управление
        const callBtn = document.getElementById('callBtn');
        const hangupBtn = document.getElementById('hangupBtn');
        const screenShareBtn = document.getElementById('screenShareBtn');
        const remoteIdInput = document.getElementById('remoteIdInput');

        // Чат
        const chatMessages = document.getElementById('chatMessages');
        const chatInput = document.getElementById('chatInput');
        const sendChatBtn = document.getElementById('sendChatBtn');

        let localStream;
        let currentCall;
        let dataConnection;
        let isScreenSharing = false;

        // --- 1. Камера ---
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                localStream = stream;
                localVideo.srcObject = stream;
                statusDiv.innerText = "Готов к подключению";
            } catch (err) {
                console.error(err);
                statusDiv.innerText = "Ошибка камеры";
                alert("Нет доступа к камере. Проверьте разрешения.");
            }
        }
        startCamera();

        // --- 2. PeerJS ---
        peer.on('open', id => {
            myIdBtn.innerText = id;
            myIdBtn.title = "Нажмите, чтобы скопировать: " + id;
        });

        // Входящий звонок
        peer.on('call', call => {
            if (confirm("Входящий звонок. Принять?")) {
                call.answer(localStream);
                handleCall(call);
            }
        });

        // Входящее соединение данных
        peer.on('connection', conn => {
            if (currentCall || confirm("Разрешить чат с " + conn.peer + "?")) {
                setupDataConnection(conn);
            }
        });

        // --- 3. Логика звонка ---
        callBtn.onclick = () => {
            const remoteId = remoteIdInput.value.trim();
            if (!remoteId) return alert("Введите ID собеседника");
            
            statusDiv.innerText = "Звоним...";
            const call = peer.call(remoteId, localStream);
            handleCall(call);

            const conn = peer.connect(remoteId);
            conn.on('open', () => setupDataConnection(conn));
        };

        function handleCall(call) {
            currentCall = call;
            callBtn.disabled = true;
            hangupBtn.disabled = false;
            screenShareBtn.disabled = false;
            statusDiv.innerText = "Соединение установлено";
            
            call.on('stream', remoteStream => {
                remoteVideo.srcObject = remoteStream;
                remoteVideo.play().catch(e => console.error(e));
            });

            call.on('close', resetUI);
            call.on('error', resetUI);
        }

        // --- 4. Демонстрация экрана ---
        screenShareBtn.onclick = async () => {
            if (!currentCall) return;

            if (!isScreenSharing) {
                try {
                    const screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true });
                    const videoTrack = screenStream.getVideoTracks()[0];
                    
                    // Замена трека в звонке
                    const sender = currentCall.peerConnection.getSenders().find(s => s.track.kind === videoTrack.kind);
                    sender.replaceTrack(videoTrack);

                    // Локальное отображение
                    localVideo.srcObject = screenStream;
                    localVideo.style.transform = "none"; // Убираем зеркало
                    
                    isScreenSharing = true;
                    screenShareBtn.innerText = "Стоп экран";
                    screenShareBtn.classList.add("btn-danger");
                    screenShareBtn.classList.remove("btn-secondary");

                    videoTrack.onended = stopScreenShare;

                } catch (err) {
                    console.error("Ошибка:", err);
                }
            } else {
                stopScreenShare();
            }
        };

        async function stopScreenShare() {
            if (!currentCall) return;
            try {
                const cameraStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
                const videoTrack = cameraStream.getVideoTracks()[0];
                const sender = currentCall.peerConnection.getSenders().find(s => s.track.kind === videoTrack.kind);
                sender.replaceTrack(videoTrack);

                // Возврат аудио
                const originalAudioTrack = localStream.getAudioTracks()[0];
                cameraStream.addTrack(originalAudioTrack);
                localStream = cameraStream;
                
                localVideo.srcObject = cameraStream;
                localVideo.style.transform = "scaleX(-1)"; // Возврат зеркала

                isScreenSharing = false;
                screenShareBtn.innerText = "Экран";
                screenShareBtn.classList.remove("btn-danger");
                screenShareBtn.classList.add("btn-secondary");
            } catch (err) {
                console.error(err);
            }
        }

        // --- 5. Чат ---
        function setupDataConnection(conn) {
            dataConnection = conn;
            chatInput.disabled = false;
            sendChatBtn.disabled = false;
            addMessage("Система", "Чат подключен", "received");

            dataConnection.on('data', data => {
                addMessage("Собеседник", data, "received");
            });
        }

        sendChatBtn.onclick = sendMessage;
        chatInput.addEventListener('keypress', e => {
            if (e.key === 'Enter') sendMessage();
        });

        function sendMessage() {
            const text = chatInput.value.trim();
            if (!text || !dataConnection) return;
            dataConnection.send(text);
            addMessage("Вы", text, "sent");
            chatInput.value = '';
        }

        function addMessage(sender, text, type) {
            const div = document.createElement('div');
            div.className = `message ${type}`;
            div.textContent = text;
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // --- 6. Утилиты ---
        myIdBtn.onclick = () => {
            const id = myIdBtn.innerText;
            navigator.clipboard.writeText(id).then(() => {
                const original = myIdBtn.innerText;
                myIdBtn.innerText = "Скопировано!";
                setTimeout(() => myIdBtn.innerText = original, 1500);
            });
        };

        hangupBtn.onclick = () => {
            if (currentCall) currentCall.close();
            if (dataConnection) dataConnection.close();
            resetUI();
        };

        function resetUI() {
            remoteVideo.srcObject = null;
            callBtn.disabled = false;
            hangupBtn.disabled = true;
            screenShareBtn.disabled = true;
            chatInput.disabled = true;
            sendChatBtn.disabled = true;
            statusDiv.innerText = "Звонок завершен";
            
            if (isScreenSharing) stopScreenShare();
            currentCall = null;
            dataConnection = null;
        }

        peer.on('error', err => {
            console.error(err);
            statusDiv.innerText = "Ошибка: " + err.type;
        });
    </script>
</body>
</html>
