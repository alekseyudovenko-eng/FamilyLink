<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Video Call (8x8 JaaS)</title>
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    <!-- Подключаем официальный SDK 8x8 -->
    <script src="https://8x8.vc/libs/external_api.min.js"></script>
    <style>
        :root {
            --bg-color: #f4f4f4;
            --panel-bg: #fff;
            --text-color: #333;
            --accent-color: #000;
            --border-color: #ccc;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        .workspace {
            flex: 1;
            position: relative;
            background: #000;
        }

        #jitsi-container {
            width: 100%;
            height: 100%;
        }

        .control-panel {
            height: 60px;
            background: var(--panel-bg);
            border-top: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 100;
        }

        .room-info {
            font-family: monospace;
            font-size: 14px;
            background: #f0f0f0;
            padding: 8px 12px;
            border-radius: 4px;
            border: 1px solid #ccc;
            cursor: pointer;
            user-select: none;
        }

        .room-info:hover {
            background: #e0e0e0;
        }

        .controls {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            text-transform: uppercase;
            font-weight: 500;
        }

        .btn-danger { background: #dc3545; color: white; }
        .btn-danger:hover { opacity: 0.8; }

        .status-msg {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            z-index: 1000;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="workspace">
        <div class="status-msg" id="statusMsg">Подключение к 8x8...</div>
        <div id="jitsi-container"></div>
    </div>

    <div class="control-panel">
        <div class="room-info" id="roomIdDisplay" title="Нажмите, чтобы скопировать ссылку">Генерация ID...</div>
        
        <div class="controls">
            <button class="btn btn-danger" onclick="hangup()">Завершить</button>
        </div>
    </div>

    <script>
        // ------------------------------------------------------------------
        // ВАЖНО: ВСТАВЬТЕ СЮДА ВАШ APP ID ОТ 8x8 JaaS
        // Пример: 'vpaas-magic-cookie-1234567890abcdef'
        // Получить бесплатно: https://jaas.8x8.vc
        // ------------------------------------------------------------------
        const APP_ID = 'vpaas-magic-cookie-ed937926a1534c09a24d94d11c7bd415/9d63e5'; 
        // ------------------------------------------------------------------

        let api = null;
        let roomName = '';

        function generateRoomName() {
            return 'biz-' + Math.random().toString(36).substring(2, 10);
        }

        function initJitsi() {
            if (APP_ID === 'ВСТАВЬТЕ_СЮДА_ВАШ_APP_ID' || APP_ID === '') {
                document.getElementById('statusMsg').innerText = "Ошибка: Нет App ID!";
                alert("Пожалуйста, получите бесплатный App ID на jaas.8x8.vc и вставьте его в код (строка 115).");
                return;
            }

            roomName = generateRoomName();
            document.getElementById('roomIdDisplay').innerText = "ID: " + roomName;

            // Формируем полный домен для вашего приложения
            const domain = APP_ID + '.8x8.vc';
            
            const options = {
                roomName: roomName,
                width: '100%',
                height: '100%',
                parentNode: document.querySelector('#jitsi-container'),
                lang: 'ru',
                configOverwrite: {
                    startWithAudioMuted: false,
                    startWithVideoMuted: false,
                    prejoinPageEnabled: false, // Сразу входим в звонок
                    disableDeepLinking: true,
                },
                interfaceConfigOverwrite: {
                    SHOW_JITSI_WATERMARK: false,
                    SHOW_WATERMARK_FOR_GUESTS: false,
                    TOOLBAR_BUTTONS: [
                        'microphone', 'camera', 'closedcaptions', 'desktop', 
                        'fullscreen', 'fodeviceselection', 'hangup', 'profile',
                        'chat', 'recording', 'livestreaming', 'etherpad', 
                        'settings', 'raisehand', 'videoquality', 'filmstrip',
                        'tileview', 'videobackgroundblur'
                    ],
                    DEFAULT_LOCAL_DISPLAY_NAME: 'Вы',
                    DEFAULT_REMOTE_DISPLAY_NAME: 'Собеседник'
                }
            };

            try {
                api = new JitsiMeetExternalAPI(domain, options);

                api.addEventListeners({
                    videoConferenceJoined: () => {
                        document.getElementById('statusMsg').innerText = "Звонок идет (8x8 JaaS)";
                    },
                    videoConferenceLeft: () => {
                        document.getElementById('statusMsg').innerText = "Звонок завершен";
                    }
                });
            } catch (e) {
                console.error(e);
                document.getElementById('statusMsg').innerText = "Ошибка загрузки";
            }
        }

        // Копирование ссылки
        document.getElementById('roomIdDisplay').onclick = function() {
            // Ссылка для 8x8 формируется особым образом
            const link = "https://" + APP_ID + ".8x8.vc/" + roomName;
            navigator.clipboard.writeText(link).then(() => {
                const original = this.innerText;
                this.innerText = "Ссылка скопирована!";
                setTimeout(() => this.innerText = original, 2000);
            });
        };

        function hangup() {
            if (api) {
                api.dispose();
                api = null;
                document.getElementById('statusMsg').innerText = "Звонок завершен";
                setTimeout(() => location.reload(), 1500);
            }
        }

        window.onload = initJitsi;
    </script>
</body>
</html>
