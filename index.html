<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Video Call (RU Stable)</title>
    <!-- Иконка -->
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    <!-- Подключаем Jitsi Meet API -->
    <script src='https://meet.jit.si/external_api.js'></script>
    <style>
        :root {
            --bg-color: #f4f4f4;
            --panel-bg: #fff;
            --text-color: #333;
            --accent-color: #000;
            --border-color: #ccc;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Основной контейнер */
        .workspace {
            display: flex;
            flex: 1;
            position: relative;
        }

        /* Контейнер для видео Jitsi */
        #jitsi-container {
            width: 100%;
            height: 100%;
            background: #000;
        }

        /* Правая панель чата (визуальная обертка) */
        .chat-overlay {
            position: absolute;
            top: 0;
            right: 0;
            width: 350px;
            height: 100%;
            background: rgba(255, 255, 255, 0.95);
            border-left: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            z-index: 100;
            transform: translateX(100%); /* Скрыт по умолчанию */
            transition: transform 0.3s ease;
        }

        .chat-overlay.active {
            transform: translateX(0);
        }

        .chat-header {
            padding: 15px;
            border-bottom: 1px solid var(--border-color);
            font-weight: bold;
            background: #f9f9f9;
            display: flex;
            justify-content: space-between;
        }

        .close-chat { cursor: pointer; }

        .chat-messages {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
        }

        /* Нижняя панель управления */
        .control-panel {
            height: 60px;
            background: var(--panel-bg);
            border-top: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 200;
        }

        .room-info {
            font-family: monospace;
            font-size: 14px;
            background: #f0f0f0;
            padding: 8px 12px;
            border-radius: 4px;
            border: 1px solid #ccc;
            cursor: pointer;
        }

        .controls {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            text-transform: uppercase;
            font-weight: 500;
        }

        .btn-primary { background: var(--accent-color); color: white; }
        .btn-secondary { background: #fff; border: 1px solid #ccc; color: #333; }
        .btn-danger { background: #dc3545; color: white; }

        /* Скрываем стандартные элементы Jitsi, чтобы сохранить ваш дизайн */
        iframe { border: none; }
    </style>
</head>
<body>

    <div class="workspace">
        <!-- Сюда Jitsi вставит видео -->
        <div id="jitsi-container"></div>

        <!-- Наш кастомный чат (пока просто заглушка, т.к. Jitsi имеет свой чат) -->
        <div class="chat-overlay" id="chatOverlay">
            <div class="chat-header">
                Чат
                <span class="close-chat" onclick="toggleChat()">✕</span>
            </div>
            <div class="chat-messages">
                <p style="color:#666; font-size:12px;">Используйте встроенный чат Jitsi (иконка сообщения в интерфейсе звонка) для надежности.</p>
            </div>
        </div>
    </div>

    <div class="control-panel">
        <div class="room-info" id="roomName" title="Нажмите, чтобы скопировать ссылку">Комната: ...</div>
        
        <div class="controls">
            <button class="btn btn-secondary" onclick="toggleChat()">Чат</button>
            <button class="btn btn-danger" onclick="hangup()">Завершить</button>
        </div>
    </div>

    <script>
        let api = null;
        let roomName = '';

        // Генерация случайного имени комнаты
        function generateRoomName() {
            return 'biz-call-' + Math.random().toString(36).substring(2, 10);
        }

        function initJitsi() {
            roomName = generateRoomName();
            document.getElementById('roomName').innerText = "ID: " + roomName;

            const domain = 'meet.jit.si';
            const options = {
                roomName: roomName,
                width: '100%',
                height: '100%',
                parentNode: document.querySelector('#jitsi-container'),
                lang: 'ru',
                configOverwrite: {
                    startWithAudioMuted: false,
                    startWithVideoMuted: false,
                    prejoinPageEnabled: false, // Отключаем страницу предпросмотра для скорости
                    disableDeepLinking: true
                },
                interfaceConfigOverwrite: {
                    // Минимизируем интерфейс Jitsi, оставляем только суть
                    SHOW_JITSI_WATERMARK: false,
                    SHOW_WATERMARK_FOR_GUESTS: false,
                    TOOLBAR_BUTTONS: [
                        'microphone', 'camera', 'closedcaptions', 'desktop', 
                        'fullscreen', 'fodeviceselection', 'hangup', 'profile',
                        'chat', 'recording', 'livestreaming', 'etherpad', 
                        'settings', 'raisehand', 'videoquality', 'filmstrip',
                        'feedback', 'stats', 'shortcuts', 'tileview', 'videobackgroundblur'
                    ],
                    DEFAULT_LOCAL_DISPLAY_NAME: 'Вы',
                    DEFAULT_REMOTE_DISPLAY_NAME: 'Собеседник'
                }
            };

            api = new JitsiMeetExternalAPI(domain, options);

            // Обработка событий
            api.addEventListeners({
                videoConferenceJoined: () => {
                    console.log("Звонок начался");
                },
                videoConferenceLeft: () => {
                    console.log("Звонок завершен");
                    document.getElementById('roomName').innerText = "Звонок завершен";
                }
            });
        }

        // Копирование ID комнаты
        document.getElementById('roomName').onclick = function() {
            const text = "https://meet.jit.si/" + roomName;
            navigator.clipboard.writeText(text).then(() => {
                const original = this.innerText;
                this.innerText = "Ссылка скопирована!";
                setTimeout(() => this.innerText = original, 2000);
            });
        };

        function toggleChat() {
            // Jitsi имеет свой встроенный чат, но мы можем открыть/закрыть нашу панель
            // В данной реализации лучше использовать встроенный чат Jitsi (кнопка "Сообщение")
            alert("Для чата используйте иконку 'Сообщение' в интерфейсе видеозвонка. Это гарантирует доставку.");
        }

        function hangup() {
            if (api) {
                api.dispose();
                api = null;
                document.getElementById('roomName').innerText = "Звонок завершен";
            }
        }

        // Запуск при загрузке
        window.onload = initJitsi;
    </script>
</body>
</html>
