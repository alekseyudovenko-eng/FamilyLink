<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Link Video</title>
    <script src="https://cdn.jsdelivr.net/npm/livekit-client@1.15.0/dist/livekit-client.umd.min.js"></script>
    <style>
        body { margin: 0; font-family: Arial, sans-serif; background: #f4f4f4; display: flex; flex-direction: column; height: 100vh; }
        .workspace { flex: 1; position: relative; background: #000; display: flex; justify-content: center; align-items: center; }
        #remoteVideoContainer { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; color: #fff; }
        #remoteVideoContainer video { width: 100%; height: 100%; object-fit: contain; }
        .local-video { position: absolute; bottom: 20px; right: 20px; width: 25%; max-width: 240px; border: 2px solid white; transform: scaleX(-1); }
        .controls { height: 60px; background: #fff; display: flex; align-items: center; justify-content: center; gap: 20px; }
        button { padding: 10px 20px; cursor: pointer; background: #000; color: #fff; border: none; border-radius: 4px; }
        .status { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.7); color: white; padding: 5px 15px; border-radius: 15px; }
    </style>
</head>
<body>
    <div class="workspace">
        <div class="status" id="status">Готов</div>
        <div id="remoteVideoContainer">Нет видео</div>
        <video id="localVideo" class="local-video" autoplay muted playsinline></video>
    </div>
    <div class="controls">
        <button onclick="connect()">Подключиться</button>
    </div>

    <script>
        const URL = 'wss://familylink-sfhuurtg.livekit.cloud';
        
        // Твой новый токен для комнаты test123
        const TOKEN = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJleHAiOjE4MTE2ODM3MTgsImlkZW50aXR5IjoidXNlcjEiLCJpc3MiOiJBUElVYUFLZUFhVUc4a3ciLCJuYmYiOjE3ODAxNDc3MTgsInN1YiI6InVzZXIxIiwidmlkZW8iOnsiY2FuUHVibGlzaCI6dHJ1ZSwiY2FuUHVibGlzaERhdGEiOnRydWUsImNhblN1YnNjcmliZSI6dHJ1ZSwicm9vbSI6InRlc3QxMjMiLCJyb29tSm9pbiI6dHJ1ZX19.dFJFiX-pLjZbeDgiUKjuUyZCA8KIYZoEXaBtJ-1VOPo'; 
        
        let room;

        async function connect() {
            try {
                document.getElementById('status').innerText = "Подключение...";
                room = new LivekitClient.Room();
                
                room.on(LivekitClient.RoomEvent.TrackSubscribed, (track) => {
                    if (track.kind === 'video') {
                        const el = track.attach();
                        document.getElementById('remoteVideoContainer').innerHTML = '';
                        document.getElementById('remoteVideoContainer').appendChild(el);
                        document.getElementById('status').innerText = "Звонок идет";
                    }
                });

                await room.connect(URL, TOKEN);
                
                const tracks = await LivekitClient.createLocalTracks({ audio: true, video: true });
                await room.localParticipant.publishTracks(tracks);
                
                tracks.forEach(t => {
                    if (t.kind === 'video') document.getElementById('localVideo').srcObject = t.mediaStream;
                });
                
                document.getElementById('status').innerText = "Подключено к: " + room.name;
            } catch (e) {
                console.error(e);
                document.getElementById('status').innerText = "Ошибка: " + e.message;
                alert("Ошибка: " + e.message);
            }
        }
    </script>
</body>
</html>
