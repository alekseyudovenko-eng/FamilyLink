<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiveKit Video Call</title>
    <script src="https://cdn.jsdelivr.net/npm/livekit-client@1.15.0/dist/livekit-client.umd.min.js"></script>
    <style>
        body { margin: 0; font-family: 'Helvetica Neue', Arial, sans-serif; background: #f4f4f4; display: flex; flex-direction: column; height: 100vh; }
        .workspace { flex: 1; position: relative; background: #000; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        
        /* Видео собеседника */
        #remoteVideoContainer { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; color: #666; }
        #remoteVideoContainer video { width: 100%; height: 100%; object-fit: contain; }
        
        /* Ваше видео (PiP) */
        .local-video {
            position: absolute; bottom: 20px; right: 20px;
            width: 25%; max-width: 240px; aspect-ratio: 16/9;
            border: 2px solid rgba(255,255,255,0.5);
            background: #222; transform: scaleX(-1);
            z-index: 10;
        }
        
        .controls {
            height: 70px; background: #fff; border-top: 1px solid #ccc;
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; padding: 10px;
        }
        
        .inputs { display: flex; gap: 10px; width: 100%; max-width: 800px; justify-content: center; }
        input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; flex: 1; font-family: monospace; }
        
        button { padding: 8px 20px; cursor: pointer; border: none; border-radius: 4px; color: white; font-weight: bold; }
        .btn-connect { background: #000; }
        .btn-disconnect { background: #dc3545; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        .status { 
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%); 
            background: rgba(0,0,0,0.8); color: white; padding: 8px 15px; 
            border-radius: 20px; font-size: 14px; z-index: 20; text-align: center;
        }
        .error { background: rgba(220, 53, 69, 0.9); }
    </style>
</head>
<body>

    <div class="workspace">
        <div class="status" id="status">Готов к подключению</div>
        <div id="remoteVideoContainer">Ожидание собеседника...</div>
        <video id="localVideo" class="local-video" autoplay muted playsinline></video>
    </div>

    <div class="controls">
        <div class="inputs">
            <!-- ВСТАВЬТЕ СВОЙ WSS URL НИЖЕ В VALUE -->
            <input type="text" id="urlInput" placeholder="wss://..." value="wss://your-project.livekit.cloud">
            
            <!-- ВСТАВЬТЕ СВОЙ ТОКЕН НИЖЕ В VALUE -->
            <input type="text" id="tokenInput" placeholder="Token..." value="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...">
        </div>
        <div>
            <button class="btn-connect" id="connectBtn" onclick="connect()">Подключиться</button>
            <button class="btn-disconnect" id="disconnectBtn" onclick="disconnect()" disabled>Отключиться</button>
        </div>
        <div style="font-size: 12px; color: #666;">Убедитесь, что URL начинается с wss://</div>
    </div>

    <script>
        let room;

        async function connect() {
            const url = document.getElementById('urlInput').value.trim();
            const token = document.getElementById('tokenInput').value.trim();
            const statusDiv = document.getElementById('status');
            const connectBtn = document.getElementById('connectBtn');
            const disconnectBtn = document.getElementById('disconnectBtn');

            // Простая проверка формата
            if (!url.startsWith('wss://')) {
                statusDiv.innerText = "Ошибка: URL должен начинаться с wss://";
                statusDiv.classList.add('error');
                return;
            }

            try {
                statusDiv.innerText = "Подключение...";
                statusDiv.classList.remove('error');
                connectBtn.disabled = true;

                // 1. Создаем комнату
                room = new LivekitClient.Room();

                // 2. Обработка видео собеседника
                room.on(LivekitClient.RoomEvent.TrackSubscribed, (track) => {
                    if (track.kind === 'video') {
                        const container = document.getElementById('remoteVideoContainer');
                        container.innerHTML = ''; 
                        const videoEl = track.attach();
                        container.appendChild(videoEl);
                        statusDiv.innerText = "Звонок идет";
                    }
                });

                room.on(LivekitClient.RoomEvent.Disconnected, () => {
                    statusDiv.innerText = "Отключено";
                    connectBtn.disabled = false;
                    disconnectBtn.disabled = true;
                });

                // 3. Подключаемся
                await room.connect(url, token);
                
                // 4. Публикуем свое видео
                const tracks = await LivekitClient.createLocalTracks({ audio: true, video: true });
                await room.localParticipant.publishTracks(tracks);
                
                // Показываем себя
                tracks.forEach(track => {
                    if (track.kind === 'video') {
                        document.getElementById('localVideo').srcObject = track.mediaStream;
                    }
                });

                disconnectBtn.disabled = false;
                statusDiv.innerText = "В комнате: " + room.name;

            } catch (err) {
                console.error(err);
                statusDiv.innerText = "Ошибка: " + err.message;
                statusDiv.classList.add('error');
                connectBtn.disabled = false;
                
                // Подсказка по ошибке
                if (err.message.includes('token')) {
                    alert("Ошибка токена! \n1. Проверьте, что токен для комнаты 'testroom'.\n2. Проверьте, что он не истек.\n3. Убедитесь, что нет пробелов.");
                } else if (err.message.includes('connection') || err.message.includes('network')) {
                    alert("Ошибка сети! \nПроверьте, что URL правильный (wss://) и не заблокирован фаерволом.");
                }
            }
        }

        function disconnect() {
            if (room) {
                room.disconnect();
            }
        }
    </script>
</body>
</html>
