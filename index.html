<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Call</title>
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    <!-- Подключаем Jitsi API -->
    <script src='https://meet.ffmuc.net/external_api.js'></script>
    <style>
        body { margin: 0; font-family: Arial, sans-serif; background: #f4f4f4; display: flex; flex-direction: column; height: 100vh; }
        #jitsi-container { flex: 1; width: 100%; background: #000; }
        .controls { 
            height: 60px; background: #fff; border-top: 1px solid #ccc; 
            display: flex; align-items: center; justify-content: center; gap: 20px; padding: 0 20px; 
        }
        .room-id { 
            font-family: monospace; background: #eee; padding: 8px 12px; 
            border-radius: 4px; cursor: pointer; border: 1px solid #ccc; font-size: 14px;
        }
        .btn { 
            padding: 8px 16px; border: none; border-radius: 4px; 
            cursor: pointer; background: #000; color: #fff; text-transform: uppercase; 
        }
    </style>
</head>
<body>
    <div id="jitsi-container"></div>
    <div class="controls">
        <div class="room-id" id="roomId" title="Нажми, чтобы скопировать ссылку">Загрузка...</div>
        <button class="btn" onclick="api.dispose()">Завершить</button>
    </div>

    <script>
        // Используем стабильный сервер в Мюнхене
        const domain = 'meet.ffmuc.net';
        
        // Генерируем случайное имя комнаты
        const roomName = 'biz-call-' + Math.random().toString(36).substring(2, 10);
        
        document.getElementById('roomId').innerText = "ID: " + roomName;
        
        // Копирование ссылки
        document.getElementById('roomId').onclick = function() {
            const link = "https://" + domain + "/" + roomName;
            navigator.clipboard.writeText(link);
            this.innerText = "Ссылка скопирована!";
            setTimeout(() => this.innerText = "ID: " + roomName, 2000);
        };

        const api = new JitsiMeetExternalAPI(domain, {
            roomName: roomName,
            width: '100%',
            height: '100%',
            parentNode: document.querySelector('#jitsi-container'),
            configOverwrite: { 
                startWithAudioMuted: false, 
                startWithVideoMuted: false,
                prejoinPageEnabled: false // Сразу входим в звонок
            },
            interfaceConfigOverwrite: { 
                SHOW_JITSI_WATERMARK: false, 
                TOOLBAR_BUTTONS: ['microphone', 'camera', 'desktop', 'fullscreen', 'hangup', 'chat'] 
            }
        });
    </script>
</body>
</html>
